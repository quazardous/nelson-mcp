services:
  build:
    build: .
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - ..:/src:ro
      - ../build:/output
      - pip-cache:/tmp/pip-cache
      - build-work:/tmp/build-work
    environment:
      - PIP_CACHE_DIR=/tmp/pip-cache
      - BUILD_WORK=/tmp/build-work

volumes:
  pip-cache:
  build-work:
