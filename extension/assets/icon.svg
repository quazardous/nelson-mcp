<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 45 170 175">

  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a9aaa"/>
      <stop offset="100%" stop-color="#5f6e7c"/>
    </linearGradient>

    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Corps -->
  <ellipse cx="136" cy="150" rx="70" ry="55" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Ventre -->
  <ellipse cx="136" cy="165" rx="40" ry="35" fill="url(#bellyGrad)"/>

  <!-- Tête -->
  <circle cx="106" cy="85" r="38" fill="url(#bodyGrad)"/>

  <!-- Cou -->
  <ellipse cx="116" cy="115" rx="22" ry="18" fill="#7aa6a1"/>

  <!-- Reflet -->
  <ellipse cx="95" cy="70" rx="12" ry="8" fill="white" opacity="0.25"/>

  <!-- Œil -->
  <circle cx="94" cy="80" r="8" fill="white"/>
  <circle cx="92" cy="80" r="3.5" fill="black"/>

  <!-- Bec -->
  <polygon points="74,88 46,98 74,105" fill="#e3a43b"/>

  <!-- Aile -->
  <ellipse cx="161" cy="150" rx="30" ry="40" fill="#4f5d6a"/>
  <ellipse cx="150" cy="140" rx="10" ry="18" fill="white" opacity="0.15"/>

  <!-- Queue -->
  <polygon points="206,150 181,135 181,165" fill="#4f5d6a"/>

  <!-- Pattes -->
  <ellipse cx="156" cy="210" rx="12" ry="6" fill="#e3a43b"/>
  <ellipse cx="121" cy="210" rx="12" ry="6" fill="#e3a43b"/>

</svg>
