name: ai_images.horde
title: AI Horde image generation
requires: [ai_images]

config:
  instances:
    type: string
    default: "[]"
    widget: list_detail
    inline: true
    label: AI Horde Instances
    helper: "Free crowdsourced image generation (https://aihorde.net)"
    name_field: name
    item_fields:
      name:
        type: string
        label: Name
        widget: text
        default: ""
      api_key:
        type: string
        label: API Key
        widget: text
        default: "0000000000"
        helper: "Anonymous key works but has lower priority"
      model:
        type: string
        label: Model
        widget: text
        default: "stable_diffusion"
      max_wait:
        type: int
        label: Max Wait (minutes)
        widget: number
        default: 5
        min: 1
        max: 30
      nsfw:
        type: boolean
        label: Allow NSFW
        widget: checkbox
        default: false
