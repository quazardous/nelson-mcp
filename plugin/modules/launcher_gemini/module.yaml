name: launcher.gemini
title: Gemini CLI provider
requires: [launcher_manager]
config_inline: true

config:
  cwd:
    type: string
    default: ""
    widget: folder
    label: Working Directory
    helper: "Directory to launch Gemini CLI in. Empty = ~/.local/share/nelson/cli/gemini/"
  args:
    type: string
    default: ""
    widget: text
    label: Extra Arguments
    helper: "Additional CLI arguments. Placeholders: {mcp_url}, {port}, {host}."
  install:
    widget: button
    label: Install Gemini CLI
    action: "plugin.modules.launcher_gemini:on_install"
