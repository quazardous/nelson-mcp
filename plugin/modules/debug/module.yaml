name: debug
title: Debug tools and diagnostics
requires: [config, events, document, http_routes]
config_inline: main

config:
  enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Enable Debug Actions
    helper: "Debug actions appear in menus but only execute when enabled"
    public: true

  enable_api:
    type: boolean
    default: false
    widget: checkbox
    label: Enable Debug HTTP API (/debug)
    helper: "Expose the /debug endpoint for remote diagnostics (eval, exec, call_tool, etc.). Keep disabled in production."
    public: true

actions:
  debug_info:
    title: "System Info"

menus:
  # Menu is always visible; on_action() checks debug.enabled at runtime
  # and shows an "enable in Options" message if disabled.
  - title: "Debug"
    context: [writer, calc, draw]
    submenu:
      - action: debug_info
