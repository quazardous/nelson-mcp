name: launcher.opencode
title: OpenCode CLI provider
requires: [launcher_manager]
config_inline: true

config:
  cwd:
    type: string
    default: ""
    widget: folder
    label: Working Directory
    helper: "Directory to launch OpenCode in. Empty = ~/.local/share/nelson/cli/opencode/"
  args:
    type: string
    default: ""
    widget: text
    label: Extra Arguments
    helper: "Additional CLI arguments. Placeholders: {mcp_url}, {port}, {host}."
  handle_config:
    type: boolean
    default: true
    widget: checkbox
    label: Handle Ollama Config
    helper: "Inject Ollama provider settings into opencode.json. Uncheck to manage config yourself."
  ollama_url:
    type: string
    default: "http://localhost:11434/v1"
    widget: text
    label: Ollama URL
    helper: "Ollama API endpoint."
  ollama_model:
    type: string
    default: "qwen3:8b"
    widget: text
    label: Ollama Model
    helper: "Model name as known by Ollama (e.g. qwen3:8b, mistral:7b, llama3.1:8b)."
  install:
    widget: button
    label: Install OpenCode
    action: "plugin.modules.launcher_opencode:on_install"
